name: Build Windows EXE and Installer

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Download code from repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: python -m pip install --upgrade pip pyinstaller

    - name: Build EXE with PyInstaller
      run: pyinstaller --noconsole --onefile --uac-admin UnblockerApp_v2.py

    - name: Compile Inno Setup Installer
      # This runs the pre-installed Inno Setup compiler in the cloud
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Unblocker_Installer_Script.iss

    - name: Upload the final Setup Wizard
      uses: actions/upload-artifact@v4
      with:
        name: Deep-File-Unblocker-Installer
        # Inno Setup automatically places the compiled installer in an 'Output' folder
        path: Output\*.exe